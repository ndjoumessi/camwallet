name: Build Android APK

# Build d'un APK release signé SANS EAS (prebuild local + Gradle).
# La signature release est injectée dans build.gradle par le config plugin
# mobile/plugins/withReleaseSigning.js lors du `expo prebuild` (android/ est en CNG,
# régénéré à chaque build — d'où le plugin plutôt qu'un build.gradle commité).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Étiquette de version pour nommer l'APK (ex. v3.5.7). Défaut : nom de la ref."
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write # nécessaire pour attacher l'APK à la Release (softprops)

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # garde-fou anti-run-infini ; 60min car le 1er run télécharge le SDK/NDK
    env:
      # Évite les warnings de dépréciation Node.js 20 sur les actions JS.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # mobile/.env est gitignoré → absent en CI. Sans ces variables, api.ts retombe
      # sur http://localhost:3000 (APK inutilisable). Les vars EXPO_PUBLIC_* sont
      # inlinées par Metro au moment du BUNDLE JS (tâche bundleRelease… DANS
      # assembleRelease), pas au prebuild — d'où le niveau JOB pour couvrir les deux.
      EXPO_PUBLIC_API_URL: https://camwallet-production.up.railway.app
      EXPO_PUBLIC_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache mobile/node_modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: mobile-${{ hashFiles('mobile/package-lock.json') }}

      - name: Install dependencies
        run: cd mobile && npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Cache des dépendances Gradle (caches + wrapper) — évite de re-télécharger
      # tout le graphe à chaque run. android/ étant en CNG (généré au prebuild), la
      # clé retombe sur le préfixe `gradle-` tant que les *.gradle n'existent pas
      # encore ; restore-keys assure la restauration par préfixe.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mobile/android/.gradle
          key: gradle-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Cache Android SDK packages
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk
          key: android-sdk-${{ hashFiles('mobile/android/build.gradle') }}
          restore-keys: |
            android-sdk-

      # Pré-installe explicitement les packages SDK requis (platform/build-tools/NDK)
      # pour éviter un téléchargement implicite et lent au premier appel Gradle.
      - name: Pré-installer les packages Android SDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006" 2>&1 | tail -5

      - name: Expo prebuild (génère android/ + applique le plugin de signature)
        run: cd mobile && npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # Configure gradle.properties : prebuild régénère android/gradle.properties, on
      # y ajoute (en dernier → priorité) la config mémoire/CI. Metaspace 2g car c'est
      # LUI qui débordait sur kspReleaseKotlin (expo-updates), pas le heap. Parallel
      # off + incremental off = empreinte mémoire réduite (runner éphémère).
      - name: Configure gradle.properties
        run: |
          cat >> mobile/android/gradle.properties <<'EOF'

          # --- Optimisations CI (ajoutées par le workflow) ---
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=2048m -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.caching=true
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.incremental=false
          ksp.incremental=false
          android.ndkVersion=27.1.12297006
          EOF

      # Le keystore est décodé APRÈS prebuild (qui régénère/efface android/).
      # build.gradle attend file("release.keystore") relatif au module app/.
      - name: Décoder le keystore release
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # Décodage en Python : le CLI `base64` de coreutils refuse (« invalid input »)
          # dès qu'il y a des \r, du padding manquant ou une variante url-safe. Python
          # nettoie tout espacement, corrige le padding, tente standard puis url-safe.
          python3 - <<'PY'
          import base64, os, sys
          raw = os.environ.get("KEYSTORE_B64", "")
          # Retire TOUT caractère d'espacement (\n, \r, espaces, tabs).
          s = "".join(raw.split())
          if not s:
              sys.exit("::error::Secret ANDROID_KEYSTORE_BASE64 vide ou absent.")
          # Corrige un padding '=' manquant (longueur multiple de 4).
          s_pad = s + "=" * (-len(s) % 4)
          data = None
          for decoder in (base64.b64decode, base64.urlsafe_b64decode):
              try:
                  data = decoder(s_pad)
                  break
              except Exception:
                  continue
          if not data:
              sys.exit(f"::error::Impossible de décoder le base64 (longueur={len(s)}). "
                       "Ré-encode le keystore : base64 -i camwallet-release.keystore (macOS) "
                       "ou base64 -w0 (Linux), puis recopie SANS espaces dans le secret.")
          with open("mobile/android/app/release.keystore", "wb") as f:
              f.write(data)
          magic = data[:4].hex()
          print(f"Keystore décodé : {len(data)} octets, en-tête = 0x{magic}")
          # Android Gradle accepte JKS (magie 0xFEEDFEED) ET PKCS12 (séquence DER ASN.1,
          # 0x3082...) — keytool moderne génère du PKCS12 par défaut. On valide les deux.
          JKS_MAGIC = "feedfeed"
          if magic == JKS_MAGIC:
              print("Keystore valide (format JKS)")
          elif magic.startswith("3082"):
              print("Keystore valide (format PKCS12)")
          else:
              print(f"::warning::Format keystore inconnu : 0x{magic}")
          PY
          test -s mobile/android/app/release.keystore || { echo "::error::Keystore non écrit."; exit 1; }
          ls -la mobile/android/app/release.keystore
          file mobile/android/app/release.keystore

      - name: Build APK Release
        # -Pandroid.injected.build.abi.filter=arm64-v8a : ne compile QUE l'ABI 64 bits
        #   (exclut armeabi-v7a) → moins de travail natif. ⚠️ l'APK n'installe PAS sur
        #   les vieux téléphones 32 bits (cf. note au build vert).
        # -Dorg.gradle.jvmargs : aligné sur gradle.properties (2g metaspace) — l'override
        #   CLI gagne, donc on le garde cohérent pour ne pas retomber à 512m.
        # --parallel retiré : plusieurs JVM Gradle simultanées aggravaient l'OOM.
        run: |
          cd mobile/android
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.build.abi.filter=arm64-v8a \
            --no-daemon \
            --build-cache \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=2g"
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Renommer l'APK
        id: rename
        env:
          # Input utilisateur (workflow_dispatch) → variable d'env + assainissement
          # (jamais interpolé directement dans le shell : risque d'injection).
          RAW_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          VER=$(printf '%s' "$RAW_VERSION" | tr -cd 'A-Za-z0-9._-')
          [ -z "$VER" ] && VER="build"
          NAME="camwallet-${VER}-android.apk"
          cp mobile/android/app/build/outputs/apk/release/app-release.apk "$NAME"
          echo "apk=$NAME" >> "$GITHUB_OUTPUT"
          echo "APK : $NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: camwallet-android-apk
          path: camwallet-*.apk
          retention-days: 30

      - name: Attacher à la Release GitHub (si tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: camwallet-*.apk
