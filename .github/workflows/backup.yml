name: Backup Supabase

on:
  schedule:
    - cron: '0 2 * * *'   # chaque nuit à 02h00 UTC
  workflow_dispatch:        # déclenchement manuel possible

jobs:
  backup:
    name: pg_dump → artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Installer postgresql-client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Dump + compression
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          FILENAME="camwallet_${TIMESTAMP}.sql.gz"
          pg_dump --no-password --format=plain "$DIRECT_DATABASE_URL" | gzip -9 > "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> "$GITHUB_ENV"
          echo "Backup : $FILENAME ($(du -sh "$FILENAME" | cut -f1))"

      - name: Upload artifact (7 jours de rétention)
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 7
          if-no-files-found: error
