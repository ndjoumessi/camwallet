name: Backup Supabase

on:
  schedule:
    - cron: '0 2 * * *'   # chaque nuit à 02h00 UTC
  workflow_dispatch:        # déclenchement manuel possible

jobs:
  backup:
    name: pg_dump → artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Installer postgresql-client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Dump + compression
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          FILENAME="backup-${DATE}.sql.gz"
          pg_dump --no-password --format=plain "$DIRECT_DATABASE_URL" | gzip -9 > "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> "$GITHUB_ENV"
          SIZE=$(du -sh "$FILENAME" | cut -f1)
          echo "✅ Backup créé : $FILENAME ($SIZE)"

      - name: Upload artifact (30 jours de rétention)
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30
          if-no-files-found: error

      - name: Notification d'échec
        if: failure()
        run: |
          echo "❌ Backup Supabase ÉCHOUÉ le $(date -u +"%Y-%m-%d %H:%M UTC")"
          echo "Logs : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
